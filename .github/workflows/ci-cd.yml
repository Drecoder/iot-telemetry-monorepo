name: Cloud Telemetry Monorepo Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Proactively opts into Node 24 runner environment execution to silence deprecation noise
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-and-test:
    name: Execute Validation and Test Suites
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      # Upgraded runtime environment target to Node 24
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # Unified Execution Pipeline: Runs 'npm ci', Jest suites, and 'terraform test/validate'
      # exactly how it executes successfully on your local WSL 2 command line.
      - name: Run Complete Test Suite Pipeline
        run: |
          make install
          make test
        env:
          AWS_ACCESS_KEY_ID: mock-key-id
          AWS_SECRET_ACCESS_KEY: mock-secret-key
          AWS_DEFAULT_REGION: us-east-1